<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Databases — Exam Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Databases — Exam Quiz</h1>
      <p class="sub">Study by exam year or by topic — or roll a random quiz.</p>
    </header>

    <!-- START -->
    <section id="start" class="card screen">
      <div class="seg" id="mode-seg">
        <button class="seg-btn active" data-mode="year">By year</button>
        <button class="seg-btn" data-mode="topic">By topic</button>
      </div>

      <p id="select-hint" class="hint"></p>
      <div id="select-list" class="select-list"></div>

      <div class="row controls">
        <label class="toggle"><input type="checkbox" id="shuffle" checked /> Shuffle</label>
        <div class="spacer"></div>
        <span id="sel-count" class="sel-count"></span>
        <button id="start-btn" class="primary">Start quiz</button>
      </div>

      <div class="divider"><span>or</span></div>
      <button id="random-btn" class="random">🎲 Random 20 questions</button>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="card screen hidden">
      <div class="progress-bar"><div id="bar"></div></div>
      <div class="qmeta">
        <span id="qcount"></span>
        <span id="qscore"></span>
      </div>
      <div id="badges" class="badges"></div>
      <div id="stem" class="stem"></div>
      <div id="options" class="options"></div>
      <div id="verdict"></div>
      <div id="explain"></div>
      <div class="row" style="margin-top:20px;">
        <button id="quit-btn" class="ghost">Quit</button>
        <div class="spacer"></div>
        <button id="check-btn" class="primary">Check answer</button>
        <button id="next-btn" class="primary hidden">Next</button>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="results" class="card screen hidden"></section>

    <footer>Static study app · data built from <code>questions/</code></footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
